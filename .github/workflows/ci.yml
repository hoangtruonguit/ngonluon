name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel chạy cũ nếu push commit mới vào cùng PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── API: Lint & Unit Tests (no services needed) ───
  api-unit:
    name: API — Lint, Build & Unit Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: api

    env:
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: api/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Unit Test with Coverage
        run: pnpm run test:cov

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: api/coverage/
          retention-days: 7

  # ─── API: E2E Tests (with services) ────────────────
  api-e2e:
    name: API — E2E Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: api-unit

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ngonluon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      elasticsearch:
        image: elasticsearch:7.17.10
        env:
          discovery.type: single-node
          ES_JAVA_OPTS: -Xms512m -Xmx512m
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q check_running"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: api

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/ngonluon_test
      JWT_SECRET: ci-test-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret
      NODE_ENV: test
      PORT: 3001
      MAIL_HOST: localhost
      MAIL_PORT: 1025
      ENABLE_MAIL: false
      ELASTICSEARCH_URL: http://localhost:9200
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://localhost:5672
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      STRIPE_SECRET_KEY: sk_test_dummy_ci
      STRIPE_WEBHOOK_SECRET: whsec_dummy_ci
      STRIPE_PRICE_BASIC: price_dummy_basic
      STRIPE_PRICE_PREMIUM: price_dummy_premium

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: api/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: E2E Test
        run: pnpm run test:e2e

  # ─── WEB (Next.js) ────────────────────────────────
  web:
    name: Web — Lint, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: web

    env:
      NEXT_PUBLIC_API_URL: http://localhost:3001

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: web/.next/cache
          key: nextjs-${{ hashFiles('web/package-lock.json') }}-${{ hashFiles('web/src/**') }}
          restore-keys: nextjs-${{ hashFiles('web/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
