<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Secure User Login | MovieStream</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec1337",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221013",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(34, 16, 19, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(236, 19, 55, 0.1);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(236, 19, 55, 0.4), 0 0 5px rgba(236, 19, 55, 0.2);
        }
        .neon-glow:hover {
            box-shadow: 0 0 25px rgba(236, 19, 55, 0.6), 0 0 10px rgba(236, 19, 55, 0.3);
        }
        body {
            font-family: "Spline Sans", sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen relative overflow-x-hidden">
<!-- Background Cinematic Layer -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-black/60 z-10"></div>
<div class="w-full h-full bg-cover bg-center scale-110 blur-md opacity-50" data-alt="Blurred cinematic movie theater seats background" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAOW5Z3hbv4EoYk4O6cTcAdWc0E9L7s53Y3Qyd9ENdCtFuI5ztSliqBOCUDDr5WDtbYYMmS-vlCprmPzm9lmdQpGO_JouqSw8pkivCumf680xcs6HjRfTas8DVh7QFaL0NHhTwNzFp4euvn5UaEGf7LJFaMiy1moYaGzV6L1xhTkXrvg7FobFN5rUU5XngYMEjTr2pk3r_5051D_4UfOamvyZ_rYftBqNzv2-E7Gm3kapzfgNkcKwVIIFhr9-kEk96gGs2KlXNOb-0');">
</div>
</div>
<!-- Layout Container -->
<div class="relative z-20 flex flex-col min-h-screen">
<!-- TopNavBar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-white/10 px-6 md:px-10 py-4">
<div class="flex items-center gap-4 text-white">
<div class="size-8 text-primary">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M36.7273 44C33.9891 44 31.6043 39.8386 30.3636 33.69C29.123 39.8386 26.7382 44 24 44C21.2618 44 18.877 39.8386 17.6364 33.69C16.3957 39.8386 14.0109 44 11.2727 44C7.25611 44 4 35.0457 4 24C4 12.9543 7.25611 4 11.2727 4C14.0109 4 16.3957 8.16144 17.6364 14.31C18.877 8.16144 21.2618 4 24 4C26.7382 4 29.123 8.16144 30.3636 14.31C31.6043 8.16144 33.9891 4 36.7273 4C40.7439 4 44 12.9543 44 24C44 35.0457 40.7439 44 36.7273 44Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-white text-xl font-bold leading-tight tracking-[-0.015em]">MovieStream</h2>
</div>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-10 px-4 bg-white/10 hover:bg-white/20 text-white text-sm font-bold transition-colors">
<span class="truncate">Help</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 flex items-center justify-center p-6">
<div class="layout-content-container flex flex-col w-full max-w-[450px]">
<!-- Login Card -->
<div class="glass-card rounded-xl p-8 md:p-10 shadow-2xl">
<div class="mb-8">
<h1 class="text-white tracking-tight text-[32px] font-bold leading-tight text-center">Sign In</h1>
<p class="text-[#c9929b] text-center mt-2 text-sm font-normal">Welcome back! Please enter your details.</p>
</div>
<!-- Form -->
<form class="space-y-4">
<!-- TextField: Email -->
<div class="flex flex-col gap-2">
<p class="text-white text-sm font-medium leading-normal">Email or Phone Number</p>
<input class="form-input flex w-full rounded-lg text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border-none bg-white/5 focus:bg-white/10 h-14 placeholder:text-[#c9929b]/50 p-4 text-base font-normal transition-all" placeholder="Enter your email or phone" type="text"/>
</div>
<!-- TextField: Password -->
<div class="flex flex-col gap-2">
<p class="text-white text-sm font-medium leading-normal">Password</p>
<div class="relative flex w-full items-stretch">
<input class="form-input flex w-full rounded-lg text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border-none bg-white/5 focus:bg-white/10 h-14 placeholder:text-[#c9929b]/50 p-4 text-base font-normal transition-all" placeholder="Enter your password" type="password"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-[#c9929b] cursor-pointer hover:text-white transition-colors">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</div>
</div>
</div>
<!-- Utils Row -->
<div class="flex items-center justify-between px-1 py-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="rounded border-none bg-white/10 text-primary focus:ring-primary focus:ring-offset-0 transition-all cursor-pointer h-4 w-4" type="checkbox"/>
<span class="text-[#c9929b] text-sm font-normal group-hover:text-white">Remember me</span>
</label>
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Primary Button -->
<button class="neon-glow flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-14 px-4 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] transition-all transform active:scale-[0.98] mt-4" type="submit">
<span class="truncate">Sign In</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center my-8 gap-4">
<div class="h-[1px] flex-1 bg-white/10"></div>
<span class="text-[#c9929b] text-xs font-bold uppercase tracking-widest">OR</span>
<div class="h-[1px] flex-1 bg-white/10"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg h-12 transition-all group">
<img class="w-5 h-5" data-alt="Google logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAw2uGX3guDgm71UShE77XZmsRy5chC15E-DJWOqc4KM8g2SGa_ZeHQuS3IGO8M-A9ZLbVEMhZYh6mkvytCvipkQc6Qmgu2Wy2Xmm6SOZTugGV5fHkaE3ro6HOiDp4aJYbuEEGQsuAGYUG1fqmfbYxYamLsmE-ZwBjiK0-WuFTCufdqgvqkKdcekkT4ppfpSVypMVApKgFAZtKHpawRFSu6tJ_NcY_h72ssTbXJKMBcqFyHM8Pz6jaqAXEtHGUV7ebCk5sNANNvMzo"/>
<span class="text-white text-sm font-medium">Google</span>
</button>
<button class="flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg h-12 transition-all">
<span class="material-symbols-outlined text-white" style="font-size: 20px;">ios</span>
<span class="text-white text-sm font-medium">Apple</span>
</button>
</div>
<!-- Footer CTA -->
<div class="mt-8 text-center">
<p class="text-[#c9929b] text-sm">
                            New to MovieStream? 
                            <a class="text-primary font-bold hover:underline ml-1" href="#">Sign up now</a>
</p>
</div>
</div>
</div>
</main>
<!-- Page Footer -->
<footer class="p-6 text-center text-[#c9929b]/40 text-xs">
<p>© 2024 MovieStream Inc. All rights reserved.</p>
</footer>
</div>
</body></html>
