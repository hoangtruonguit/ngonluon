# /etc/nginx/sites-available/grafana
# Sau khi tạo: sudo ln -s /etc/nginx/sites-available/grafana /etc/nginx/sites-enabled/
# SSL: sudo certbot --nginx -d grafana.phimtot.online

server {
    listen 80;
    server_name grafana.phimtot.online;

    # Certbot sẽ tự thêm SSL redirect vào đây

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Grafana live reload / WebSocket
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
