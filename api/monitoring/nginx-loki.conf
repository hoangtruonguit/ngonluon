# /etc/nginx/sites-available/loki
# Sau khi tạo: sudo ln -s /etc/nginx/sites-available/loki /etc/nginx/sites-enabled/
# SSL: sudo certbot --nginx -d loki.phimtot.online
#
# Lưu ý: Loki endpoint nên được bảo vệ bằng basic auth hoặc chỉ dùng nội bộ.
# File này chủ yếu dùng để Grafana datasource kết nối qua HTTPS nếu cần.

server {
    listen 80;
    server_name loki.phimtot.online;

    # Basic auth để bảo vệ Loki khỏi truy cập trái phép
    # Tạo file: sudo htpasswd -c /etc/nginx/.htpasswd admin
    auth_basic           "Loki - Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass         http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
