<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Loader - Gaming Interface</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@300;500;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/nostalgist"></script>
    <style>
        :root {
            --bg-color: #0b0c15;
            --primary-neon: #00f3ff;
            --secondary-neon: #bc13fe;
            --text-color: #e0e6ed;
            --panel-bg: rgba(20, 22, 35, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 50% 50%, rgba(188, 19, 254, 0.1) 0%, transparent 60%),
                linear-gradient(0deg, rgba(11, 12, 21, 1) 0%, rgba(20, 22, 40, 0.4) 100%);
        }

        /* Grid Background Effect */
        .grid-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% {
                transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px);
            }

            100% {
                transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px);
            }
        }

        .container {
            position: relative;
            width: 450px;
            padding: 40px;
            border-radius: 4px;
            /* Techy sharp corners */
            background: var(--panel-bg);
            border: 1px solid rgba(0, 243, 255, 0.3);
            box-shadow:
                0 0 20px rgba(0, 243, 255, 0.1),
                inset 0 0 30px rgba(0, 243, 255, 0.05);
            backdrop-filter: blur(10px);
            text-align: center;
            clip-path: polygon(0 0,
                    100% 0,
                    100% 85%,
                    95% 100%,
                    0 100%);
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100px;
            height: 2px;
            background: var(--primary-neon);
            box-shadow: 0 0 10px var(--primary-neon);
        }

        .container::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100px;
            height: 2px;
            background: var(--secondary-neon);
            box-shadow: 0 0 10px var(--secondary-neon);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        h1 span {
            color: var(--primary-neon);
        }

        p.subtitle {
            color: rgba(224, 230, 237, 0.6);
            margin-bottom: 40px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .upload-section {
            margin-bottom: 20px;
        }


        .cyber-btn {
            position: relative;
            display: inline-block;
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: bold;
            color: var(--primary-neon);
            text-transform: uppercase;
            letter-spacing: 2px;
            background: transparent;
            border: 1px solid var(--primary-neon);
            cursor: pointer;
            overflow: hidden;
            transition: 0.3s;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .cyber-btn:hover {
            background: rgba(0, 243, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
            text-shadow: 0 0 8px var(--primary-neon);
            transform: translateY(-2px);
        }

        .cyber-btn:active {
            transform: translateY(1px);
        }

        .cyber-btn .btn-glitch {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--primary-neon);
            opacity: 0.5;
            mix-blend-mode: overlay;
        }

        .status-display {
            margin-top: 30px;
            min-height: 40px;
            padding: 10px;
            border-left: 2px solid var(--secondary-neon);
            background: linear-gradient(90deg, rgba(188, 19, 254, 0.1) 0%, transparent 100%);
            text-align: left;
            font-family: 'Share Tech Mono', monospace;
            /* Fallback if not loaded */
            font-size: 0.9rem;
            color: var(--secondary-neon);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .status-display.active {
            opacity: 1;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon {
            font-size: 1.2rem;
        }

        /* Scanline effect */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom,
                    rgba(255, 255, 255, 0),
                    rgba(255, 255, 255, 0) 50%,
                    rgba(0, 0, 0, 0.1) 50%,
                    rgba(0, 0, 0, 0.1));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
            opacity: 0.3;
        }

        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-color);
            opacity: 0.5;
        }

        .tl {
            top: 10px;
            left: 10px;
            border-right: none;
            border-bottom: none;
        }

        .tr {
            top: 10px;
            right: 10px;
            border-left: none;
            border-bottom: none;
        }

        .bl {
            bottom: 10px;
            left: 10px;
            border-right: none;
            border-top: none;
        }

        .br {
            bottom: 10px;
            right: 10px;
            border-left: none;
            border-top: none;
        }
    </style>
</head>

<body>

    <div class="grid-bg"></div>
    <div class="scanline"></div>

    <div class="container">
        <!-- Decorative corners inside container -->
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <h1>System <span>Loader</span></h1>
        <p class="subtitle">Select data module to initialize</p>

        <div class="upload-section">
            <button type="button" id="fileInput">Select Game </button>

        </div>

        <div class="status-display" id="statusDisplay">
            <div class="file-info">
                <span class="icon">➜</span>
                <span id="fileName">No file loaded...</span>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const statusDisplay = document.getElementById('statusDisplay');
        const fileNameSpan = document.getElementById('fileName');



        fileInput.addEventListener('click', (e) => {
            Nostalgist.nes(showOpenFilePicker)
        });

        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }
    </script>
</body>

</html>
